services:
  - type: web
    name: turfx-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_COOKIE_EXPIRES_DAYS
        value: 7
      - key: CLIENT_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: PAYMENT_PROVIDER
        value: mock
      - key: ADMIN_NAME
        value: TURFX Platform Owner
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_ROTATE_PASSWORD
        value: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: EMAIL_FROM
        value: TURFX <no-reply@turfx.local>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
